    <script>
        (function normalizeCardUrl() {
            const currentUrl = new URL(window.location.href);
            const decodeUrlValue = (value) => {
                try {
                    return decodeURIComponent(value.replace(/\+/g, ' '));
                } catch (error) {
                    return value;
                }
            };

            if (currentUrl.searchParams.has('@')) {
                return;
            }

            let cardName = currentUrl.searchParams.get('name') || '';
            const rawQuery = currentUrl.search.startsWith('?')
                ? currentUrl.search.slice(1).trim()
                : '';

            if (!cardName && rawQuery && !rawQuery.includes('=')) {
                cardName = rawQuery;
            }

            if (!cardName && currentUrl.hash.length > 1) {
                cardName = currentUrl.hash.slice(1);
            }

            if (!cardName) {
                const pathSegments = currentUrl.pathname.split('/').filter(Boolean);
                const lastSegment = pathSegments[pathSegments.length - 1] || '';

                if (lastSegment && !/\.[a-z0-9]+$/i.test(lastSegment)) {
                    cardName = lastSegment;
                }
            }

            cardName = decodeUrlValue(cardName).trim();

            if (!cardName) {
                cardName = "Shiva";
            }

            const normalizedPath = `/${encodeURIComponent(cardName)}`;
            const needsCleanUrl =
                currentUrl.pathname !== normalizedPath ||
                currentUrl.search.length > 0 ||
                currentUrl.hash.length > 0;

            if (needsCleanUrl) {
                currentUrl.pathname = normalizedPath;
                currentUrl.search = '';
                currentUrl.hash = '';
                window.history.replaceState({}, document.title, currentUrl.toString());
            }
        })();
    </script>
